<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0f2027" />
      <stop offset="50%" stop-color="#203a43" />
      <stop offset="100%" stop-color="#2c5364" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#grad1)" rx="15"/>
  <text x="50%" y="50%" font-family="Arial, sans-serif" font-size="30" font-weight="bold" fill="#ffffff" text-anchor="middle" alignment-baseline="middle">
    Awesome Fully-Sharded Data Parallelization
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
  </text>
  <circle cx="100" cy="100" r="20" fill="#00d2ff">
    <animate attributeName="cy" values="100;80;100" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="700" cy="100" r="20" fill="#3a7bd5">
    <animate attributeName="cy" values="100;120;100" dur="2.5s" repeatCount="indefinite"/>
  </circle>
</svg>